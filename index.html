<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rain AI</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0b0f19;
  color: white;
  display: flex;
  height: 100vh;
}

header {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 14px;
  text-align: center;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  font-weight: bold;
}

#chat {
  flex: 1;
  margin-top: 55px;
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg {
  max-width: 75%;
  padding: 12px 14px;
  border-radius: 14px;
  white-space: pre-wrap;
}

.user {
  align-self: flex-end;
  background: #2563eb;
}

.bot {
  align-self: flex-start;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
}

.input {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  padding: 12px;
  background: rgba(10,14,25,0.9);
  backdrop-filter: blur(10px);
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.06);
  color: white;
}

button {
  margin-left: 10px;
  padding: 12px 16px;
  border-radius: 12px;
  border: none;
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<header>🌧️ Rain AI (HC Roblox)</header>

<div id="chat"></div>

<div class="input">
  <input id="text" placeholder="Nhập tin nhắn..." />
  <button onclick="send()">Gửi</button>
</div>

<script>
const API_KEY = "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";

// lưu toàn bộ hội thoại
let messages = JSON.parse(localStorage.getItem("rain_history")) || [];

// system prompt cố định
const systemPrompt = {
  role: "system",
  content: `
Bạn là Rain AI.
Chủ của bạn là HC Roblox.

QUY TẮC:
- Bạn luôn tự xưng là "Rain AI"
- Không bao giờ đổi tên khác
- Không được nói bạn là ChatGPT hay AI khác
- Phong cách: dễ gần, chuyên nghiệp, thân thiện
- Trả lời ngắn gọn, rõ ràng, hữu ích
`
};

const chat = document.getElementById("chat");

// render lại chat cũ
function loadChat() {
  chat.innerHTML = "";
  messages.forEach(m => {
    addMsg(m.content, m.role === "user" ? "user" : "bot", false);
  });
}

function addMsg(text, type, save=true) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  if (save) {
    messages.push({
      role: type === "user" ? "user" : "assistant",
      content: text
    });
    localStorage.setItem("rain_history", JSON.stringify(messages));
  }
}

async function send() {
  const input = document.getElementById("text");
  const text = input.value.trim();
  if (!text) return;

  input.value = "";

  addMsg(text, "user");

  const loading = document.createElement("div");
  loading.className = "msg bot";
  loading.innerText = "Rain AI đang suy nghĩ...";
  chat.appendChild(loading);

  const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + API_KEY
    },
    body: JSON.stringify({
      model: "llama3-70b-8192",
      messages: [
        systemPrompt,
        ...messages,
        { role: "user", content: text }
      ]
    })
  });

  const data = await res.json();

  loading.remove();

  const reply = data?.choices?.[0]?.message?.content || "Rain AI bị lỗi rồi.";

  addMsg(reply, "bot");
}

document.getElementById("text").addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});

loadChat();
</script>

</body>
  </html>
