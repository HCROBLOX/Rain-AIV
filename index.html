<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#050816;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.container{
width:95%;
max-width:1000px;
height:95vh;
background:rgba(12,18,35,.95);
border:1px solid rgba(0,170,255,.2);
border-radius:25px;
overflow:hidden;
display:flex;
flex-direction:column;
box-shadow:
0 0 20px rgba(0,170,255,.15),
0 0 50px rgba(0,170,255,.08);
}

.header{
height:70px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:700;
color:#9ee6ff;
border-bottom:1px solid rgba(0,170,255,.15);
backdrop-filter:blur(10px);
}

.chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
max-width:80%;
padding:14px 18px;
margin-bottom:12px;
border-radius:18px;
white-space:pre-wrap;
word-break:break-word;
line-height:1.5;
}

.user{
margin-left:auto;
background:linear-gradient(135deg,#0077ff,#00d4ff);
color:white;
}

.ai{
background:#131d37;
color:#eafaff;
border:1px solid rgba(0,170,255,.15);
}

.input-box{
display:flex;
gap:10px;
padding:15px;
border-top:1px solid rgba(0,170,255,.15);
}

#message{
flex:1;
background:#131d37;
border:1px solid rgba(0,170,255,.2);
outline:none;
padding:15px;
font-size:16px;
border-radius:15px;
color:white;
}

#message:focus{
box-shadow:0 0 15px rgba(0,170,255,.25);
}

button{
border:none;
padding:15px 25px;
border-radius:15px;
cursor:pointer;
font-weight:bold;
color:white;
background:linear-gradient(135deg,#0077ff,#00d4ff);
}

button:hover{
opacity:.9;
}

.typing{
color:#9ee6ff;
padding:10px;
}

::-webkit-scrollbar{
width:8px;
}

::-webkit-scrollbar-thumb{
background:#0b6dff;
border-radius:50px;
}
</style>

</head>
<body>

<div class="container">

<div class="header">
✨ Neon AI
</div>

<div class="chat" id="chat"></div>

<div class="input-box">
<input
id="message"
placeholder="Nhập tin nhắn..."
autocomplete="off">

<button onclick="sendMessage()">
Gửi
</button>
</div>

</div>

<script>

const API_KEY = "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";

let messages =
JSON.parse(
localStorage.getItem("chat_history")
) || [];

const chat =
document.getElementById("chat");

function saveHistory(){
localStorage.setItem(
"chat_history",
JSON.stringify(messages)
);
}

function renderChat(){

chat.innerHTML="";

messages.forEach(msg=>{

const div =
document.createElement("div");

div.className =
"message " +
(msg.role==="user"
? "user"
: "ai");

div.textContent =
msg.content;

chat.appendChild(div);

});

chat.scrollTop =
chat.scrollHeight;
}

renderChat();

async function sendMessage(){

const input =
document.getElementById(
"message"
);

const text =
input.value.trim();

if(!text) return;

messages.push({
role:"user",
content:text
});

saveHistory();
renderChat();

input.value="";

const typing =
document.createElement("div");

typing.className =
"typing";

typing.innerHTML =
"AI đang trả lời...";

chat.appendChild(
typing
);

chat.scrollTop =
chat.scrollHeight;

try{

const response =
await fetch(
"https://api.groq.com/openai/v1/chat/completions",
{
method:"POST",

headers:{
"Authorization":
`Bearer ${API_KEY}`,
"Content-Type":
"application/json"
},

body:JSON.stringify({
model:
"llama-3.3-70b-versatile",
messages:messages
})
}
);

const data =
await response.json();

typing.remove();

if(!data.choices){
throw new Error(
JSON.stringify(data)
);
}

const reply =
data.choices[0]
.message.content;

messages.push({
role:"assistant",
content:reply
});

saveHistory();
renderChat();

}catch(error){

typing.remove();

messages.push({
role:"assistant",
content:
"❌ " +
error.message
});

saveHistory();
renderChat();
}
}

document
.getElementById("message")
.addEventListener(
"keydown",
function(e){
if(e.key==="Enter"){
sendMessage();
}
}
);

</script>

</body>
  </html>
